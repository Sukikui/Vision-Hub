name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "compose.yaml"
      - "deploy/**"
      - "docs/**"
      - "Dockerfile"
      - "vision_hub/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "compose.yaml"
      - "deploy/**"
      - "docs/**"
      - "Dockerfile"
      - "vision_hub/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  vision-hub-tests:
    name: 🧪 Vision-Hub Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 📦 Install dependencies
        run: uv sync --locked

      - name: 🔎 Compile Vision-Hub Python files
        run: uv run python -m compileall main.py vision_hub tools tests/test_export_yolo_ncnn.py tests/test_homeassistant_discovery.py tests/test_mqtt_messages.py tests/test_mqtt_topics.py tests/test_ncnn_yolo.py tests/test_storage.py tests/test_storage_retention.py

      - name: 🧪 Run Vision-Hub unit tests
        run: |
          uv run python -m unittest -v \
            tests.test_export_yolo_ncnn \
            tests.test_homeassistant_discovery \
            tests.test_mqtt_messages \
            tests.test_mqtt_topics \
            tests.test_ncnn_yolo \
            tests.test_storage \
            tests.test_storage_retention

  deployment-tests:
    name: 🛠️ Deployment Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 📦 Install dependencies
        run: uv sync --locked

      - name: 🔎 Compile deployment tests
        run: uv run python -m compileall tests/test_deploy_configs.py

      - name: 🧪 Run deployment tests
        run: uv run python -m unittest -v tests.test_deploy_configs
