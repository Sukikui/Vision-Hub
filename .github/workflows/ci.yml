name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "vision_hub/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "vision_hub/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  lint-test:
    name: 🧪 Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 📦 Install dependencies
        run: uv sync --locked

      - name: 🔎 Compile Python files
        run: uv run python -m compileall main.py vision_hub tests

      - name: 🧪 Run unit tests
        run: uv run python -m unittest discover -v -s tests
