name: vision-hub

x-dnsmasq-common: &dnsmasq-common
  build:
    context: .
    dockerfile: deploy/docker/dnsmasq.Dockerfile
  image: vision-hub-dnsmasq:local
  network_mode: host
  cap_add:
    - NET_ADMIN
    - NET_RAW
  entrypoint: ["dnsmasq"]
  command: ["--no-daemon", "--conf-file=/etc/dnsmasq.d/vision-hub.conf"]
  restart: unless-stopped

services:
  dnsmasq-field:
    <<: *dnsmasq-common
    volumes:
      - ./deploy/docker/generated/dnsmasq-field/vision-hub.conf:/etc/dnsmasq.d/vision-hub.conf:ro

  dnsmasq-admin:
    <<: *dnsmasq-common
    volumes:
      - ./deploy/docker/generated/dnsmasq-admin/vision-hub.conf:/etc/dnsmasq.d/vision-hub.conf:ro

  mosquitto:
    image: eclipse-mosquitto:2
    network_mode: host
    volumes:
      - ./deploy/docker/generated/mosquitto/vision-hub.conf:/mosquitto/config/vision-hub.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    command: ["mosquitto", "-c", "/mosquitto/config/vision-hub.conf"]
    restart: unless-stopped

  vision-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: vision-hub:local
    network_mode: host
    depends_on:
      - mosquitto
    environment:
      VISION_HUB_MQTT_HOST: "127.0.0.1"
      VISION_HUB_MQTT_PORT: "1883"
      VISION_HUB_MODEL_PATH: "/opt/vision-hub/models/yolo11n-ncnn"
      VISION_HUB_DATA_DIR: "/var/lib/vision-hub"
    volumes:
      - ./models/yolo11n-ncnn:/opt/vision-hub/models/yolo11n-ncnn:ro
      - type: bind
        source: ${VISION_HUB_HOST_DATA_DIR:-/var/lib/vision-hub-data}
        target: /var/lib/vision-hub
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    privileged: true
    environment:
      TZ: ${HOME_ASSISTANT_TZ:-Europe/Paris}
    volumes:
      - type: bind
        source: ${HOME_ASSISTANT_CONFIG_DIR:-/var/lib/vision-hub-homeassistant}
        target: /config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
